<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Aviação</title>

<style>
body { margin:0; background:#0b0f14; font-family:Arial; color:white; }

.container { display:grid; grid-template-columns:60% 40%; height:100vh; }

.left { padding:25px; display:flex; flex-direction:column; gap:15px; }

.header { display:flex; align-items:center; gap:15px; }
.logo { width:70px; }
.titulo { font-size:34px; }

.status { font-size:22px; padding:6px 12px; border-radius:8px; }
.metar { background:#121821; padding:10px; border-radius:8px; }

.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }

.box { background:#121821; padding:10px; border-radius:8px; text-align:center; }

.curiosidade { background:#1a2430; padding:15px; border-radius:10px; }

.alt { background:#121821; padding:10px; border-radius:8px; }

.footer { margin-top:auto; font-size:12px; color:#888; }

.right { position:relative; }

button {
position:absolute;
bottom:10px;
right:10px;
z-index:10;
padding:12px;
border:none;
border-radius:10px;
background:#00c853;
color:black;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

button:hover {
background:#00e676;
}

.vfr { background:#00c853; }
.mvfr { background:#2979ff; }
.ifr { background:#d50000; }
.lifr { background:#aa00ff; }

</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="header">
<img src="logo.png" class="logo">
<div class="titulo">SBSR</div>
</div>

<div id="status" class="status">Carregando...</div>

<div id="metar" class="metar"></div>

<div class="grid">
<div class="box">Vento<br><div id="vento"></div></div>
<div class="box">Vis<br><div id="vis"></div></div>
<div class="box">Temp<br><div id="temp"></div></div>
<div class="box">Teto<br><div id="teto"></div></div>
</div>

<div class="curiosidade">
<b>Curiosidade da aviação</b><br>
<div id="curiosidade"></div>
</div>

<div class="alt">
<b>Alternado (SBRP):</b><br>
<div id="alt"></div>
</div>

<div class="footer" id="hora"></div>

</div>

<div class="right">

<!-- MAPA -->
<iframe 
src="https://embed.windy.com/embed2.html?lat=-20.82&lon=-49.38&zoom=7&overlay=radar"
style="width:100%; height:100%; border:none;">
</iframe>

<!-- BOTÃO RÁDIO -->
<button onclick="abrirRadio()">📻 Rádio SBSR</button>

</div>

</div>

<script>

// 🔑 SUA API AVWX (troque depois por segurança)
const API_KEY = "Fb_8qgbHtbFaG2CrBD7mHpw2RlcAei9pMJYolbt43oE";

// ======================
// CURIOSIDADES
// ======================

const curiosidades = [
"🛫 Altitude densidade reduz performance",
"🌡️ Calor aumenta distância de decolagem",
"🌬️ Crosswind é componente lateral",
"🛬 Aproximação é contra o vento",
"⚠️ Wind shear é crítico",
"🧭 Heading ≠ Track com vento",
"🛫 Vx e Vy são diferentes",
"🌪️ CB gera turbulência severa",
"📡 METAR é observação, TAF é previsão",
"⚖️ Peso influencia distância de pouso"
];

setInterval(()=>{
document.getElementById("curiosidade").innerText =
curiosidades[Math.floor(Math.random()*curiosidades.length)];
},8000);

// ======================
// AVWX METAR
// ======================

async function fetchMetar(icao){

try{
const res = await fetch(`https://avwx.rest/api/metar/${icao}`, {
headers: { Authorization: API_KEY }
});

const d = await res.json();

return {
rawOb: d.raw,
wdir: d.wind_direction?.value || "--",
wspd: d.wind_speed?.value || "--",
visib: d.visibility?.value || "--",
temp: d.temperature?.value || "--",
fltCat: d.flight_rules || "--",
clouds: d.clouds || []
};

}catch{
return null;
}
}

// ======================
// FORMATOS
// ======================

function visMetros(v){
if(!v) return "--";
if(v>=10000) return "9999 m";
return v+" m";
}

function teto(c){
if(!c || !c.length) return "--";
return c[0].type+" "+c[0].altitude+"ft";
}

// ======================
// ATUALIZAÇÃO
// ======================

async function atualizar(){

const m = await fetchMetar("SBSR");

if(m){
document.getElementById("status").innerText = m.fltCat;
document.getElementById("status").className = "status "+m.fltCat.toLowerCase();
document.getElementById("metar").innerText = m.rawOb;
document.getElementById("vento").innerText = `${m.wdir}° ${m.wspd}kt`;
document.getElementById("vis").innerText = visMetros(m.visib);
document.getElementById("temp").innerText = m.temp+"°C";
document.getElementById("teto").innerText = teto(m.clouds);
}else{
document.getElementById("status").innerText = "SEM DADOS";
}

// alternado SBRP
const alt = await fetchMetar("SBRP");

if(alt){
document.getElementById("alt").innerText =
`${alt.fltCat} | ${alt.wdir}° ${alt.wspd}kt`;
}else{
document.getElementById("alt").innerText = "Indisponível";
}

document.getElementById("hora").innerText =
"Atualizado: "+new Date().toLocaleTimeString();
}

setInterval(atualizar,300000);
atualizar();

// ======================
// RÁDIO (ABRIR EM NOVA ABA)
// ======================

function abrirRadio(){
window.open("https://www.liveatc.net/hlisten.php?mount=sbsr&icao=sbsr","_blank");
}

</script>

</body>
</html>
