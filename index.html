<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Aviação</title>

<style>
body {
    margin: 0;
    background: #0b0f14;
    font-family: Arial, sans-serif;
    color: white;
}

.container {
    display: grid;
    grid-template-columns: 60% 40%;
    height: 100vh;
}

.left {
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.header {
    display: flex;
    align-items: center;
    gap: 20px;
}

.logo {
    width: 80px;
}

.titulo {
    font-size: 36px;
    font-weight: bold;
}

.status {
    font-size: 26px;
    padding: 8px 16px;
    border-radius: 10px;
    display: inline-block;
    margin-top: 10px;
}

.metar {
    font-size: 20px;
    background: #121821;
    padding: 15px;
    border-radius: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.box {
    background: #121821;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.label {
    font-size: 14px;
    color: #aaa;
}

.valor {
    font-size: 24px;
    margin-top: 5px;
}

.vento-seta {
    font-size: 30px;
}

.alt {
    background: #121821;
    padding: 15px;
    border-radius: 10px;
}

.footer {
    margin-top: auto;
    font-size: 14px;
    color: #888;
}

.right iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.vfr { background: #00c853; }
.mvfr { background: #2979ff; }
.ifr { background: #d50000; }
.lifr { background: #aa00ff; }

</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="header">
    <img src="logo.png" class="logo">
    <div class="titulo">SBSR</div>
</div>

<div id="status" class="status">...</div>

<div id="metar" class="metar"></div>

<div class="grid">
    <div class="box">
        <div class="label">Vento</div>
        <div id="vento" class="valor"></div>
        <div id="seta" class="vento-seta"></div>
    </div>

    <div class="box">
        <div class="label">Visibilidade</div>
        <div id="vis" class="valor"></div>
    </div>

    <div class="box">
        <div class="label">Temperatura</div>
        <div id="temp" class="valor"></div>
    </div>

    <div class="box">
        <div class="label">Teto</div>
        <div id="teto" class="valor"></div>
    </div>
</div>

<div class="alt">
    <strong>Aeroportos próximos:</strong><br>
    <div id="alt"></div>
</div>

<div class="footer" id="hora"></div>

</div>

<div class="right">
<iframe src="https://embed.windy.com/embed2.html?lat=-20.82&lon=-49.38&zoom=7&level=surface&overlay=radar"></iframe>
</div>

</div>

<script>
const aeroportos = ["SBSR","SBRP","SBAU"];

// 🔥 SETA CORRETA (vento indo para onde sopra)
function setaVento(dir){
    if (!dir || dir === "VRB") return "↻";

    let d = (parseInt(dir) + 180) % 360;

    if (d < 22.5 || d >= 337.5) return "↑";
    if (d < 67.5) return "↗";
    if (d < 112.5) return "→";
    if (d < 157.5) return "↘";
    if (d < 202.5) return "↓";
    if (d < 247.5) return "↙";
    if (d < 292.5) return "←";
    return "↖";
}

function teto(clouds){
    if (!clouds || clouds.length === 0) return "--";
    return clouds[0].cover + " " + clouds[0].base + "ft";
}

async function pegar(icao){
    const url = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`;
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}&_=${Date.now()}`);
    return await res.json();
}

async function atualizar(){

    try{
        const data = await pegar("SBSR");
        const m = data[0];

        document.getElementById("metar").innerText = m.rawOb;
        document.getElementById("vento").innerText = `${m.wdir}° ${m.wspd}kt`;
        document.getElementById("seta").innerText = setaVento(m.wdir);
        document.getElementById("vis").innerText = m.visib;
        document.getElementById("temp").innerText = m.temp + "°C";
        document.getElementById("teto").innerText = teto(m.clouds);

        const s = document.getElementById("status");
        s.innerText = m.fltCat;
        s.className = "status " + m.fltCat.toLowerCase();

    } catch{
        document.getElementById("status").innerText = "ERRO";
    }

    let texto = "";
    for (let i = 1; i < aeroportos.length; i++){
        try{
            const d = await pegar(aeroportos[i]);
            const m = d[0];
            texto += `${aeroportos[i]} → ${m.fltCat}<br>`;
        } catch{}
    }

    document.getElementById("alt").innerHTML = texto;

    document.getElementById("hora").innerText =
        "Atualizado: " + new Date().toLocaleTimeString();
}

setInterval(atualizar, 300000);
atualizar();
</script>

</body>
</html>
