<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Aviação</title>

<style>
body {
    margin: 0;
    background: #0b0f14;
    font-family: Arial, sans-serif;
    color: white;
}

.container {
    display: grid;
    grid-template-columns: 60% 40%;
    height: 100vh;
}

.left {
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.header {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logo { width: 70px; }
.titulo { font-size: 34px; }

.status {
    font-size: 22px;
    padding: 6px 12px;
    border-radius: 8px;
}

.metar {
    background: #121821;
    padding: 10px;
    border-radius: 8px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

.box {
    background: #121821;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

.valor { font-size: 18px; }

.curiosidade {
    background: #1a2430;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
    line-height: 1.5;
}

.alt {
    background: #121821;
    padding: 10px;
    border-radius: 8px;
}

.footer {
    margin-top: auto;
    font-size: 12px;
    color: #888;
}

.right iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.vfr { background: #00c853; }
.mvfr { background: #2979ff; }
.ifr { background: #d50000; }
.lifr { background: #aa00ff; }
</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="header">
<img src="logo.png" class="logo">
<div class="titulo">SBSR</div>
</div>

<div id="status" class="status"></div>

<div id="metar" class="metar"></div>

<div class="grid">
<div class="box"><div>Vento</div><div id="vento" class="valor"></div></div>
<div class="box"><div>Vis</div><div id="vis" class="valor"></div></div>
<div class="box"><div>Temp</div><div id="temp" class="valor"></div></div>
<div class="box"><div>Teto</div><div id="teto" class="valor"></div></div>
<div class="box"><div>Pista</div><div id="pista" class="valor"></div></div>
</div>

<div class="curiosidade">
<b>Curiosidade da aviação</b><br>
<div id="curiosidade"></div>
</div>

<div class="alt">
<b>Alternado (SBRP):</b><br>
<div id="alt"></div>
</div>

<div class="footer" id="hora"></div>

</div>

<div class="right">
<iframe src="https://embed.windy.com/embed2.html?lat=-20.82&lon=-49.38&zoom=7&overlay=radar"></iframe>
</div>

</div>

<script>

// ======================
// CURIOSIDADES
// ======================

const curiosidadesVIP = [
"✈️ Aviões voam a mais de 10 km de altitude.",
"🌍 O voo mais longo dura mais de 18 horas.",
"🛫 Decolar contra o vento ajuda a subir mais rápido.",
"🌬️ Ventos podem reduzir o tempo de voo.",
"⚡ Aviões são preparados para raios.",
"🛬 Pistas seguem direção magnética",
"🌫️ Baixa visibilidade dificulta pousos",
"🧭 Pilotos usam graus para navegação"
];

const curiosidadesAluno = [
"🛫 Altitude densidade reduz performance.",
"🌡️ Calor aumenta distância de decolagem.",
"🧭 Heading e track são diferentes com vento.",
"⚖️ Peso maior exige maior velocidade",
"☁️ BKN define teto operacional",
"🌬️ Crosswind afeta pouso",
"🛫 Flaps aumentam sustentação",
"📡 METAR é observação atual"
];

const curiosidadesAvancado = [
"🛩️ Razão de subida depende de potência excedente",
"⚠️ Tailwind aumenta distância de pouso",
"🧭 Altímetro depende do QNH correto",
"🌪️ CB causa turbulência severa",
"📡 NOTAM altera operações",
"🛫 Vx e Vy variam com peso",
"⚖️ CG afeta estabilidade",
"🌬️ Wind shear é crítico"
];

let nivelAtual = 0;
const niveis = ["👤 Geral","🎓 Aluno","🛩️ Avançado"];

function pegarLista(){
if(nivelAtual===0) return curiosidadesVIP;
if(nivelAtual===1) return curiosidadesAluno;
return curiosidadesAvancado;
}

function rodarCuriosidades(){
const lista=pegarLista();
const texto=lista[Math.floor(Math.random()*lista.length)];

document.getElementById("curiosidade").innerHTML =
`<b>${niveis[nivelAtual]}</b><br>${texto}`;
}

setInterval(rodarCuriosidades,8000);
setInterval(()=>{nivelAtual=(nivelAtual+1)%3},30000);
rodarCuriosidades();

// ======================
// METAR
// ======================

async function pegar(icao){
const url=`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`;
const res=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}&_=${Date.now()}`);
return await res.json();
}

function visMetros(v){
if(!v) return "--";
if(v==="6+"||v==="9999") return "9999 m";
return (parseFloat(v)*1000)+" m";
}

function teto(c){
if(!c||!c.length)return"--";
return c[0].cover+" "+c[0].base+"ft";
}

function calcularPista(wdir){
const pistas=[{nome:"07",dir:70},{nome:"25",dir:250}];
let melhor=null;

pistas.forEach(p=>{
let ang=Math.abs(wdir-p.dir);
if(ang>180) ang=360-ang;

let head=Math.cos(ang*Math.PI/180);

if(!melhor||head>melhor.head){
melhor={pista:p.nome};
}
});

return melhor.pista;
}

async function atualizar(){

try{
const d=await pegar("SBSR");
const m=d[0];

document.getElementById("metar").innerText=m.rawOb;
document.getElementById("vento").innerText=`${m.wdir}° ${m.wspd}kt`;
document.getElementById("vis").innerText=visMetros(m.visib);
document.getElementById("temp").innerText=m.temp+"°C";
document.getElementById("teto").innerText=teto(m.clouds);
document.getElementById("pista").innerText=
calcularPista(parseInt(m.wdir));

let s=document.getElementById("status");
s.innerText=m.fltCat;
s.className="status "+m.fltCat.toLowerCase();

}catch{
document.getElementById("status").innerText="ERRO";
}

// alternado
try{
const d=await pegar("SBRP");
const m=d[0];

document.getElementById("alt").innerHTML =
`${m.fltCat} | ${m.wdir}° ${m.wspd}kt`;

}catch{}

document.getElementById("hora").innerText =
"Atualizado: " + new Date().toLocaleTimeString();
}

setInterval(atualizar,300000);
atualizar();

</script>

</body>
</html>
