<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel METAR - SBSR</title>

<style>
body {
    margin: 0;
    background: #0b0f14;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.logo {
    width: 120px;
    margin-bottom: 10px;
}

.titulo {
    font-size: 55px;
    font-weight: bold;
}

.status {
    font-size: 30px;
    margin-top: 10px;
    padding: 10px 25px;
    border-radius: 12px;
    font-weight: bold;
}

.metar {
    font-size: 26px;
    margin: 15px;
    max-width: 85%;
}

.taf {
    font-size: 20px;
    color: #ccc;
    max-width: 85%;
    white-space: pre-wrap;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    margin-top: 20px;
}

.box {
    background: #121821;
    padding: 20px;
    border-radius: 15px;
}

.label {
    font-size: 16px;
    color: #aaa;
}

.valor {
    font-size: 30px;
}

.footer {
    position: absolute;
    bottom: 15px;
    font-size: 14px;
    color: #888;
}

.vfr { background: #00c853; }
.mvfr { background: #2979ff; }
.ifr { background: #d50000; }
.lifr { background: #aa00ff; }
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <div class="titulo">SBSR</div>
    <div id="status" class="status">Carregando...</div>

    <div id="metar" class="metar">Aguardando dados...</div>
    <div id="taf" class="taf">Carregando TAF...</div>

    <div class="grid">
        <div class="box">
            <div class="label">Vento</div>
            <div id="vento" class="valor">--</div>
        </div>

        <div class="box">
            <div class="label">Visibilidade</div>
            <div id="vis" class="valor">--</div>
        </div>

        <div class="box">
            <div class="label">Temperatura</div>
            <div id="temp" class="valor">--</div>
        </div>
    </div>

    <div class="footer" id="hora"></div>

</div>

<script>
const ICAO = "SBSR";

async function atualizar() {

    // ===== METAR =====
    try {
        const metarUrl = `https://aviationweather.gov/api/data/metar?ids=${ICAO}&format=json`;
        const metarRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(metarUrl)}`);
        const metarData = await metarRes.json();

        if (metarData && metarData.length > 0) {
            const m = metarData[0];

            document.getElementById("metar").innerText = m.rawOb;
            document.getElementById("vento").innerText = `${m.wdir || "--"}° ${m.wspd || "--"} kt`;
            document.getElementById("vis").innerText = m.visib ? `${m.visib} km` : "--";
            document.getElementById("temp").innerText = `${m.temp || "--"}°C`;

            const status = document.getElementById("status");
            const cat = m.fltCat || "VFR";
            status.innerText = cat;
            status.className = "status " + cat.toLowerCase();
        }

    } catch (e) {
        console.error("Erro METAR:", e);
        document.getElementById("status").innerText = "ERRO METAR";
    }

    // ===== TAF (RAW MAIS ESTÁVEL) =====
    try {
        const tafUrl = `https://aviationweather.gov/api/data/taf?ids=${ICAO}&format=raw`;
        const tafRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(tafUrl)}`);
        const tafText = await tafRes.text();

        if (tafText && !tafText.includes("No data")) {
            document.getElementById("taf").innerText = tafText;
        } else {
            document.getElementById("taf").innerText = "TAF indisponível";
        }

    } catch (e) {
        console.error("Erro TAF:", e);
        document.getElementById("taf").innerText = "Erro ao carregar TAF";
    }

    document.getElementById("hora").innerText =
        "Atualizado: " + new Date().toLocaleTimeString();
}

// Atualiza a cada 5 min
setInterval(atualizar, 300000);

// Primeira execução
atualizar();
</script>

</body>
</html>
